<title>404 · Aaron Hanson</title>
<style>
  :root{--paper:#f6f6f4;--ink:#1b1d1f;--dim:#6d7278;--acc:#d44000}

  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;

  h1{font-size:1rem;font-weight:700;letter-spacing:.22em;margin:0 0 1.5rem}

<body>
<main>
  <h1>404 &middot; NOT FOUND</h1>
  <p>this address has no body.&nbsp; nine of them are next door, orbiting.</p>
